<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="utf-8" />
  <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#006633" />
  <meta name="description" content="Plateforme digitale de la Banque Nationale Agricole - Services bancaires en ligne, prise de rendez-vous, localisation d'agences" />
  <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  
  <!-- Preconnect to external domains -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://bna.tn/" />
  <meta property="og:title" content="BNA Digital - Banque Nationale Agricole" />
  <meta property="og:description" content="Plateforme digitale de la Banque Nationale Agricole" />
  <meta property="og:image" content="%PUBLIC_URL%/og-image.png" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://bna.tn/" />
  <meta property="twitter:title" content="BNA Digital - Banque Nationale Agricole" />
  <meta property="twitter:description" content="Plateforme digitale de la Banque Nationale Agricole" />
  <meta property="twitter:image" content="%PUBLIC_URL%/og-image.png" />

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BankOrCreditUnion",
    "name": "Banque Nationale Agricole",
    "description": "Banque nationale tunisienne offrant des services bancaires complets",
    "url": "https://bna.tn",
    "logo": "https://bna.tn/logo.png",
    "address": {
      "@type": "PostalAddress",
      "addressCountry": "TN",
      "addressLocality": "Tunis"
    },
    "contactPoint": {
      "@type": "ContactPoint",
      "telephone": "+216-71-123-456",
      "contactType": "customer service"
    }
  }
  </script>
  
  <title>BNA Digital - Banque Nationale Agricole</title>
</head>
<body>
  <noscript>Vous devez activer JavaScript pour utiliser cette application.</noscript>
  <div id="root"></div>
  
  <!-- Loading screen -->
  <div id="loading-screen" style="
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #006633 0%, #008041 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    transition: opacity 0.5s ease-out;
  ">
    <div style="text-align: center; color: white;">
      <div style="
        width: 60px;
        height: 60px;
        border: 4px solid rgba(255,255,255,0.3);
        border-top: 4px solid white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 20px;
      "></div>
      <h1 style="font-size: 24px; margin-bottom: 10px;">BNA Digital</h1>
      <p style="opacity: 0.8;">Chargement en cours...</p>
    </div>
  </div>
  
  <style>
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
  
  <script>
    // Hide loading screen when app is ready
    window.addEventListener('load', function() {
      setTimeout(function() {
        const loadingScreen = document.getElementById('loading-screen');
        if (loadingScreen) {
          loadingScreen.style.opacity = '0';
          setTimeout(function() {
            loadingScreen.style.display = 'none';
          }, 500);
        }
      }, 1000);
    });
    
    // Error handling
    window.addEventListener('error', function(e) {
      console.error('Application error:', e.error);
    });
  </script>
</body>
</html>
